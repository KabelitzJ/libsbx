name: Scene
assets:
  images:
    - &base
      name: base
      path: res://textures/base.png
  cube_images:
    - &skybox
      name: skybox
      path: res://skyboxes/clouds2
  static_meshes:
    - &half
      name: half
      path: res://meshes/terrain/half/half.gltf
      source: disk
    - &full
      name: full
      path: res://meshes/terrain/full/full.gltf
      source: disk
    - &edge_three
      name: edge_three
      path: res://meshes/terrain/edge_three/edge_three.gltf
